<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="STL Horizonte">
    <link rel="apple-touch-icon" href="logo.png">
    
    <title>JESSI SHOP | COTIZADOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="tu-archivo-logica.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        section { animation: fadeIn 0.4s ease-out forwards; }
       </style>
</head>
<body class="bg-slate-50">
    

   <div id="app" class="max-w-md mx-auto min-h-screen relative pb-32">
        
        <main id="main-content" class="px-5 pt-6">
            
              
<section id="view-calculator" class="space-y-6 pb-28">
    <header class="mt-4 relative overflow-hidden bg-[#08121e] rounded-[1.5rem] p-5 text-white shadow-2xl">
        <div class="absolute top-0 right-0 w-24 h-24 bg-amber-500/10 rounded-full -mr-12 -mt-12 blur-2xl"></div>
        <h2 class="text-[14px] font-black uppercase tracking-[0.15em] text-slate-200">COTIZADOR <span class="text-amber-400">JESSI SHOP</span></h2>
        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Importaciones SHEIN Honduras</p>
    </header>

    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
        <div class="flex items-center gap-2 mb-2">
            <span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black">1</span>
            <h3 class="text-[10px] font-black uppercase text-slate-600 tracking-widest">Costos en la App (USA)</h3>
        </div>

        <div>
            <label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Precio del Producto ($)</label>
            <input type="number" id="calc-price" placeholder="0.00" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none ring-2 ring-transparent focus:ring-blue-500/10 transition-all">
        </div>

       <div class="space-y-2">
    <div class="flex justify-between items-center px-2">
        <label class="text-[9px] font-black uppercase text-slate-400 block">Envío SHEIN a USA ($)</label>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="toggle-shipping" class="sr-only peer" onchange="toggleShippingInput()">
            <div class="w-8 h-4 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-600"></div>
        </label>
    </div>
    <input type="number" id="calc-shipping-usa" value="3.99" 
           class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none transition-all opacity-40" 
           disabled>
</div>

        <button onclick="calcularPrecioApp()" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase text-[9px] tracking-widest">
            Generar Precio Final App
        </button>

        <div id="result-app-step" class="hidden bg-blue-50 p-4 rounded-2xl border border-blue-100 space-y-2 animate-slide-up">
            <div class="flex justify-between text-[10px] font-bold text-blue-800">
                <span>Tax estimado (9%):</span>
                <span id="res-val-tax">$ 0.00</span>
            </div>
            <div class="flex justify-between text-sm font-black text-blue-900 border-t border-blue-200 pt-2">
                <span>TOTAL APP SHEIN:</span>
                <span id="res-val-total-app">$ 0.00</span>
            </div>
        </div>
    </div>

    <div id="step-2-container" class="hidden bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4 animate-slide-up">
        <div class="flex items-center gap-2 mb-2">
            <span class="bg-amber-100 text-amber-600 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black">2</span>
            <h3 class="text-[10px] font-black uppercase text-slate-600 tracking-widest">Logística y Reventa (HN)</h3>
        </div>

        <div>
            <label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Flete USA a HN ($)</label>
            <input type="number" id="calc-flete-hn" value="1.99" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none">
        </div>

        <button onclick="calcularPrecioVentaFinal()" class="w-full bg-amber-500 text-white font-black py-5 rounded-[2rem] shadow-xl shadow-amber-200 active:scale-95 transition-all uppercase text-[10px] tracking-[0.2em]">
            Calcular Precio Final Lps
        </button>
    </div>

    <div id="calc-result" class="hidden animate-fadeIn px-2">
        <div class="bg-[#08121e] text-white p-8 rounded-[3rem] shadow-2xl relative overflow-hidden border border-white/5">
            <div class="absolute top-0 right-0 w-32 h-32 bg-amber-400/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
            
            <p class="text-[10px] font-black uppercase opacity-50 tracking-[0.3em] text-center mb-2">Precio de Venta Sugerido</p>
            
            <div class="flex justify-center items-center mb-6">
                <span class="text-4xl font-black text-amber-400 mr-2">L</span>
                <input type="number" id="res-total" class="bg-transparent text-5xl font-black text-center text-amber-400 tracking-tighter outline-none w-full max-w-[220px]">
            </div>

            <div class="space-y-3 border-t border-white/10 pt-6">
    <div class="flex justify-between items-start text-slate-400">
        <span class="text-[9px] font-bold uppercase tracking-widest">Inversión Total</span>
        <div class="text-right">
            <span id="res-val-costo-usd" class="text-sm font-black text-white block">$ 0.00</span>
            <span id="res-val-costo-lps" class="text-[10px] font-bold text-slate-500 block">L 0.00</span>
        </div>
    </div>

    <div class="flex justify-between items-center text-slate-400">
        <span class="text-[9px] font-bold uppercase tracking-widest">Margen aplicado</span>
        <span id="res-val-margen" class="text-sm font-black text-emerald-400">0%</span>
    </div>

    <div class="mt-4 pt-4 border-t border-white/5">
        <label class="text-[10px] font-black uppercase text-emerald-400 tracking-[0.2em] italic mb-1 block">Utilidad Jessi Shop (Lps)</label>
        <div class="flex items-center">
            <span class="text-emerald-400 font-black mr-2">L</span>
            <input type="number" id="res-val-utilidad-input" 
                   class="bg-transparent text-xl font-black text-emerald-400 outline-none border-b border-emerald-400/30 focus:border-emerald-400 w-full"
                   oninput="recalcularDesdeUtilidad()">
        </div>
    </div>
</div>
</section>

     

<style>
    @keyframes slide-up {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
</style>
          
        <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[95%] max-w-md bg-[#08121e]/90 backdrop-blur-2xl border border-white/10 p-3 flex justify-around items-center z-50 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.4)]">
    
   
    <button id="nav-calc" onclick="showView('calculator')" class="flex flex-col items-center gap-1 group flex-1 transition-all opacity-100">
    <div class="p-2 rounded-2xl group-active:scale-90 transition-transform text-amber-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" 
             style="filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6)); color: #fbbf24;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
        </svg>
    </div>
    <span class="text-[8px] font-black uppercase tracking-widest italic text-amber-400">Cotizar</span>
</button>
</nav>
     
     
    <script type="module" src="script.js"></script>
</body>
</html>
